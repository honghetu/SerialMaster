name: build-and-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore SerialMaster.sln

      - name: Build (Release)
        run: dotnet build SerialMaster.sln -c Release --no-restore /p:TreatWarningsAsErrors=false

      - name: Test
        run: dotnet test tests/SerialMaster.Core.Tests --no-build -c Release --logger "trx;LogFileName=test_results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test_results.trx'

  publish:
    runs-on: windows-latest
    needs: build
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single-file
        shell: pwsh
        run: |
          dotnet publish src/SerialMaster.App/SerialMaster.App.csproj `
            -c Release -r win-x64 --self-contained true `
            /p:PublishSingleFile=true `
            /p:IncludeNativeLibrariesForSelfExtract=true `
            /p:EnableCompressionInSingleFile=true `
            /p:DebugType=none /p:DebugSymbols=false `
            -o publish-self-contained

      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path publish-self-contained\SerialMaster.App.exe, README.md, LICENSE, CHANGELOG.md -DestinationPath SerialMaster-win-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SerialMaster-win-x64
          path: SerialMaster-win-x64.zip

      - name: Create release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: SerialMaster-win-x64.zip
          generate_release_notes: true
